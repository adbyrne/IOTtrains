# NY&E Layout Control System — Mosquitto Broker Config
#
# Deployed to: /etc/mosquitto/mosquitto.conf  (NOT conf.d — must be main file
# so Mosquitto 2.0 loads it; conf.d is only read if include_dir is present)
#
# TODO: once layout WiFi is stable, change listener to bind to layout WiFi only:
#   listener 1883 192.168.10.1

pid_file /run/mosquitto/mosquitto.pid

listener 1883 0.0.0.0

allow_anonymous false
password_file /etc/mosquitto/passwd
acl_file /etc/mosquitto/acl

persistence true
persistence_location /var/lib/mosquitto/
persistence_file mosquitto.db

log_dest syslog
log_type error
log_type warning
log_type notice
