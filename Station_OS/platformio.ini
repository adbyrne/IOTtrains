; PlatformIO Project Configuration File
;
; Build:       pio run
; Upload fw:   pio run --target upload
; Upload fs:   pio run --target uploadfs   (upload schedule.json to LittleFS)
; Monitor:     pio device monitor
;
; First-time setup on a new unit:
;   1. pio run --target uploadfs   (upload schedule.json)
;   2. pio run --target upload     (upload firmware)
;   3. Open serial monitor, type 'help', configure station_id + WiFi, then 'save'

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = huge_app.csv
lib_extra_dirs = ~/Arduino/libraries
lib_deps =
    lvgl/lvgl@^9.0.0
    Bodmer/TFT_eSPI@^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    marvinroger/AsyncMqttClient@^0.9.0
    bblanchon/ArduinoJson@^7
build_flags =
    -DLV_CONF_INCLUDE_SIMPLE
    -I ${PROJECT_DIR}/include
extra_scripts = pre:scripts/copy_lv_conf.py
